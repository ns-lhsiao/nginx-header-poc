services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - http-server

  http-server:
    image: nginx:alpine
    volumes:
      - ./http-server/default.conf:/etc/nginx/conf.d/default.conf:ro
