server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    location ~ ^/(mf|ms)(/(.*))?$ {
        set $suffix /$3;
        set $npe_env $http_x_npe_env;
        set $fallback_path $suffix;

        if ($npe_env != '') {
            set $suffix /$npe_env/$3;
        }

        proxy_pass http://http-server$suffix;
        proxy_intercept_errors on;
        error_page 404 = @env_fallback;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Fallback-Path $fallback_path;
    }

    location @env_fallback {
        # $fallback_path is set in the original location but not available here.
        # Use the upstream response header we passed through.
        # Actually, named locations lose the parent's set variables.
        # Workaround: re-extract from original $request_uri.
        set $orig_path /;
        if ($request_uri ~ "^/(mf|ms)/(.+)$") {
            set $orig_path /$2;
        }
        proxy_pass http://http-server$orig_path;
        proxy_set_header Host $host;
    }
}
